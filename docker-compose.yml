# docker-compose.yml
# Customer Churn & LTV Prediction Engine
#
# Services:
#   postgres   → PostgreSQL 15       : http://localhost:5432  (churn_db / churn_user / churn_pass)
#   api        → FastAPI inference   : http://localhost:8000  (REST API + /docs)
#   metabase   → Metabase BI        : http://localhost:3000  (PRIMARY dashboard — spec requirement)
#   dashboard  → Streamlit (dev)    : http://localhost:8501  (supplementary developer view)
#
# Quick start:
#   docker-compose up --build                        # start everything
#   docker-compose exec api python scripts/load_to_postgres.py  # load Telco data into DB
#   Open http://localhost:3000 to set up Metabase
#
# Stop:
#   docker-compose down -v   (removes volumes)
#   docker-compose down      (keeps volumes / data)

version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  # Week 1 requirement: Setup PostgreSQL database and load the Telco dataset.
  # After startup, run: docker-compose exec postgres psql -U churn_user -d churn_db
  # To ingest data: docker-compose exec api python scripts/load_to_postgres.py
  postgres:
    image: postgres:15-alpine
    container_name: churn-postgres
    environment:
      POSTGRES_DB:       churn_db
      POSTGRES_USER:     churn_user
      POSTGRES_PASSWORD: churn_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn_user -d churn_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI Inference Service ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=churn_db
      - DB_USER=churn_user
      - DB_PASSWORD=churn_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit Dashboard (supplementary developer view) ─────────────────────
  # The spec primary dashboard is Metabase (above, port 3000).
  # Streamlit is kept as a lightweight dev/demo view.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-dashboard
    command: >
      streamlit run dashboard/app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=churn_db
      - DB_USER=churn_user
      - DB_PASSWORD=churn_pass
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Metabase BI Dashboard ────────────────────────────────────────────────────
  # Week 4 requirement: Connect BI tool to database and API, build interactive
  # dashboards showing global churn risk and segmenting users by LTV.
  #
  # First-run setup (one time only):
  #   1. Open http://localhost:3000
  #   2. Create admin account
  #   3. Add Database → PostgreSQL:
  #        Host: postgres  |  Port: 5432  |  Database: churn_db
  #        User: churn_user  |  Password: churn_pass
  #   4. Browse tables: customers, predictions, v_churn_by_contract, v_ltv_segments
  #   5. Build dashboards using Metabase's no-code question builder
  metabase:
    image: metabase/metabase:latest
    container_name: churn-metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_TYPE:               h2
      MB_DB_FILE:               /metabase-data/metabase.db
      JAVA_TIMEZONE:            Asia/Kolkata
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  metabase_data:
    driver: local

