# customer-churn-ltv-engine/config.yaml

# Data Paths
data:
  raw_path: "data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv"
  processed_path: "data/processed/telco_churn_processed.csv"
  target_col_churn: "Churn"
  target_col_ltv: "TotalCharges"   # Used as LTV regression target — excluded from feature lists below

# Features configuration
# NOTE: TotalCharges is intentionally NOT listed here because it is the LTV
# regression target (target_col_ltv above). Including it as both a feature and
# a target would cause data leakage in the LTV training pipeline.
features:
  categorical:
    - "gender"
    - "SeniorCitizen"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "Contract"
    - "PaperlessBilling"
    - "PaymentMethod"
  numerical:
    - "tenure"
    - "MonthlyCharges"
    # TotalCharges removed — it is the LTV target, not a predictor feature

# Model hyperparameters & settings
model:
  churn:
    model_type: "random_forest"
    n_estimators: 100
    max_depth: 6
    random_state: 42
    test_size: 0.2
  ltv:
    model_type: "ridge"
    alpha: 1.0
    random_state: 42
    test_size: 0.2

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "reports/engine.log"

# PostgreSQL database connection
# Week 1 requirement: Setup PostgreSQL database and load the Telco dataset.
# Override any of these via environment variables (DB_HOST, DB_PORT, etc.)
database:
  host:     "localhost"
  port:     5432
  name:     "churn_db"
  user:     "churn_user"
  password: "churn_pass"
  table_customers:  "customers"
  table_predictions: "predictions"
